version: "3.8"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - hf_cache:/root/.cache/huggingface
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - hf_cache:/root/.cache/huggingface
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  milvus-standalone:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - hf_cache:/root/.cache/huggingface
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL}
      - DATABASE_URL=postgresql+asyncpg://rag:rag123@postgres:5432/rag_platform
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - hf_cache:/root/.cache/huggingface
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - milvus-standalone

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag123
      POSTGRES_DB: rag_platform
    ports:
      - "5432:5432"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.core.celery_app worker --loglevel=info --concurrency=2
    environment:
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - DATABASE_URL=postgresql+asyncpg://rag:rag123@postgres:5432/rag_platform
      - REDIS_URL=redis://redis:6379/0
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL}
    volumes:
      - hf_cache:/root/.cache/huggingface
      - uploads:/app/uploads
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - postgres
      - redis
      - milvus-standalone

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.core.celery_app beat --loglevel=info
    environment:
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - DATABASE_URL=postgresql+asyncpg://rag:rag123@postgres:5432/rag_platform
      - REDIS_URL=redis://redis:6379/0
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL}
    volumes:
      - hf_cache:/root/.cache/huggingface
      - uploads:/app/uploads
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - postgres
      - redis
      - milvus-standalone

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  uploads:
  hf_cache:
  pgdata:
